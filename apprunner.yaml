version: 1.0

runtime: python3

build:
  commands:
    build:
      - pip install --upgrade pip
      - pip install -r requirements.txt

run:
  runtime-version: 3.11
  command: uvicorn knowledge_server.py --host 0.0.0.0 --port 8080 --lifespan on
  network:
    port: 8080
    env: PORT


version: 1.0
runtime: python311
build:
  commands:
    build:
      - echo "Dependencies will be installed in pre-run to ensure persistence."
run:
  runtime-version: 3.11
  pre-run:
    - pip3 install -r requirements.txt
  command: python3 knowledge_server.py
  network:
    port: 8080
  env:
    - name: PORT
      value: "8080"
